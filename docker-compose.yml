version: '3.8'
services:
  workspace:
    image: ghcr.io/sthira-labs/php-dev:8.1 # you can replace with official php images or your own
    volumes:
      - ./:/work
    working_dir: /work
    command: tail -f /dev/null
    depends_on:
      - mysql
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: version_vault_tests
    ports:
      - "3306:3306"
